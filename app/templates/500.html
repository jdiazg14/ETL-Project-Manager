{% extends "base.html" %}

{% block title %}Error del Servidor{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-400px)] flex items-center justify-center">
    <div class="text-center">
        <h1 class="text-8xl font-bold text-red-600 mb-4">500</h1>
        <h2 class="text-4xl font-bold text-gray-800 mb-3">Error Interno del Servidor</h2>
        <p class="text-gray-600 text-lg mb-8">Ha ocurrido un error inesperado. Por favor, intente más tarde.</p>
        <a href="{{ url_for('index') }}" class="inline-block gradient-bg text-white px-8 py-3 rounded-lg hover:opacity-90 transition font-semibold">
            <i class="fas fa-home"></i> Volver al Inicio
        </a>
    </div>
</div>
{% endblock %}
